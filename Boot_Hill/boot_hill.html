<div class="wrapper">
  <div class="main-layout">
    <span class="banner">
      <h1>Boot Hill</h1>
    </span>
    <section class="characteristics-grid">
      <label><span>Character Name</span><input type="text" name="attr_character_name" class="large-input" value="" title="@{character_name}"/></label>
      <label><span>Player</span><input type="text" name="attr_player_name" class="large-input" value="" title="@{player_name}"/></label>
      <label><span>Nationality</span><input type="text" name="attr_nationality" class="large-input" value="" title="@{nationality}"/></label>
      <label><span>Home town</span><input type="text" name="attr_home_town" class="large-input" value="" title="@{home_town}"/></label>
      <label><span>Gender</span><input type="text" name="attr_gender" class="medium-input" value="" title="@{gender}"/></label>
      <label><span>Handedness</span><input type="text" name="attr_handedness" class="medium-input" value="" title="@{handedness}"/></label>
      <label><span>Age</span><input type="text" name="attr_age" class="small-input" value="" title="@{age}"/></label>
      <label><span>Height</span><input type="text" name="attr_height" class="small-input" value="" title="@{height}"/></label>
      <label><span>Weight</span><input type="text" name="attr_weight" class="small-input" value="" title="@{weight}"/></label>
      <label><span>Background</span><input type="text" name="attr_background" class="large-input" value="" title="@{background}"/></label>
      <label><span>Year</span><input type="text" name="attr_year" class="small-input" value="" title="@{year}"/></label>
      <label><span>Total XP</span><input type="text" name="attr_xp_total" class="small-input" value="" title="@{xp_total}"/></label>
      <label><span>XP Left</span><input type="text" name="attr_xp_left" class="small-input" value="" title="@{xp_left}"/></label>
    </section>
  </div>
</div>
